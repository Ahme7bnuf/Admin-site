<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة الأدمن</title>
</head>

<body>

<h2>Admin Panel</h2>

<input id="code" placeholder="كود الطالب">
<select id="status">
  <option value="تم">تم</option>
  <option value="لم يتم">لم يتم</option>
</select>

<button onclick="save()">حفظ</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 بياناتك أنت
const firebaseConfig = {
  apiKey: "AIzaSyAt6ctdyQgA6yTO6QZGYyCZltO-ZTMEU5w",
  authDomain: "platform-499ca.firebaseapp.com",
  databaseURL: "https://platform-499ca-default-rtdb.firebaseio.com",
  projectId: "platform-499ca"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.save = function(){

  let code = document.getElementById("code").value;
  let status = document.getElementById("status").value;
  let msg = document.getElementById("msg");

  if(code === ""){
    msg.innerHTML = "اكتب الكود";
    return;
  }

  set(ref(db, "students/" + code), {
    status: status
  });

  msg.innerHTML = "تم الحفظ ✔";
}
</script>

</body>
</html>
